<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة منتجات المقر الملكي 📦</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal: #1e293b; --gold: #c5a059; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: system-ui; background: var(--bg); margin: 0; direction: rtl; }
        .admin-header { background: var(--royal); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        .container { max-width: 1000px; margin: 20px auto; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; padding: 0 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-add { background: var(--royal); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* قائمة المنتجات */
        .p-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; background: white; border-radius: 10px; margin-bottom: 10px; }
        .p-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .p-actions { margin-right: auto; display: flex; gap: 10px; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>📦 إدارة منتجات المتجر الملكي</h1>
    <button onclick="location.href='admin.html'" style="background:none; border:1px solid white; color:white; padding:5px 15px; border-radius:20px; cursor:pointer;">العودة للوحة التحكم</button>
</div>

<div class="container">
    <div class="card">
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="p-name" placeholder="اسم المنتج (مثال: شحن 1000 جوهرة)">
        <input type="number" id="p-price" placeholder="السعر">
        
        <div style="border: 2px dashed #ddd; padding: 15px; text-align: center; border-radius: 10px; cursor: pointer;" onclick="document.getElementById('f-input').click()">
            <span id="u-status">🖼️ اضغط لرفع صورة المنتج</span>
            <input type="file" id="f-input" hidden accept="image/*" onchange="uploadProductImg(this)">
        </div>
        <input type="hidden" id="p-img-url">
        <img id="p-preview" style="width:100%; margin-top:10px; border-radius:10px; display:none;">

        <textarea id="p-desc" placeholder="وصف المنتج..."></textarea>
        <button class="btn-add" onclick="saveProduct()">نشر المنتج في المتجر ✅</button>
    </div>

    <div>
        <h3>📋 المنتجات الحالية في المقر</h3>
        <div id="products-list">
            </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    // 1. رفع الصورة
    async function uploadProductImg(input) {
        const file = input.files[0];
        if(!file) return;
        document.getElementById('u-status').innerText = "جاري الرفع... ⏳";
        
        const fileName = `prod_${Date.now()}.png`;
        const { data, error } = await _supabase.storage.from('store-assets').upload(fileName, file);

        if(!error) {
            const { data: { publicUrl } } = _supabase.storage.from('store-assets').getPublicUrl(fileName);
            document.getElementById('p-img-url').value = publicUrl;
            document.getElementById('p-preview').src = publicUrl;
            document.getElementById('p-preview').style.display = 'block';
            document.getElementById('u-status').innerText = "تم رفع الصورة ✅";
        }
    }

    // 2. حفظ المنتج
    async function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img-url').value;

        if(!name || !price || !img) return alert("أكمل البيانات والصورة أولاً!");

        const { error } = await _supabase.from('products').insert([{
            name, price: parseFloat(price), image_url: img, description: document.getElementById('p-desc').value, status: 'active'
        }]);

        if(!error) { alert("تمت الإضافة!"); location.reload(); }
        else { alert("خطأ: " + error.message); }
    }

    // 3. حذف المنتج
    async function deleteProduct(id) {
        if(!confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) return;
        const { error } = await _supabase.from('products').delete().eq('id', id);
        if(!error) location.reload();
    }

    // 4. تحميل المنتجات
    async function load() {
        const { data } = await _supabase.from('products').select('*').order('id', {ascending: false});
        document.getElementById('products-list').innerHTML = data.map(p => `
            <div class="p-item">
                <img src="${p.image_url}">
                <div>
                    <b>${p.name}</b><br>
                    <small>${p.price} ${CONFIG.CURRENCY}</small>
                </div>
                <div class="p-actions">
                    <button class="btn-del" onclick="deleteProduct(${p.id})">🗑️ حذف</button>
                </div>
            </div>
        `).join('');
    }
    load();
</script>
</body>
</html>
