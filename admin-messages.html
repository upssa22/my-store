<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المراقبة الملكية 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { 
            --royal-blue: #1e293b; 
            --royal-gold: #c5a059; 
            --bg-gray: #f8fafc; 
            --card-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-gray); 
            margin: 0; 
            padding: 20px; 
            direction: rtl; 
            color: #334155;
        }

        .container { max-width: 900px; margin: auto; }

        .header { 
            background: var(--royal-blue); 
            color: white; 
            padding: 25px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 4px solid var(--royal-gold); 
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .header h2 { margin: 0; font-size: 1.4rem; }

        .btn-refresh { 
            background: var(--royal-gold); 
            border: none; 
            padding: 12px 25px; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-refresh:hover { background: #b08d4a; transform: scale(1.05); }

        .msg-card { 
            background: white; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 15px; 
            border-right: 6px solid var(--royal-gold); 
            box-shadow: var(--card-shadow); 
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-info { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px dashed #e2e8f0; 
            padding-bottom: 12px; 
            margin-bottom: 15px; 
        }

        .user-name { font-weight: 800; color: var(--royal-blue); font-size: 1.1rem; }
        
        .time { font-size: 0.85rem; color: #94a3b8; font-weight: 600; }

        .badge { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            background: #f1f5f9; 
            color: #64748b; 
            font-weight: bold; 
            margin-left: 10px; 
            border: 1px solid #e2e8f0; 
        }

        .media-btn { 
            margin-top: 15px; 
            padding: 12px 20px; 
            background: #fffbeb; 
            border: 1px solid var(--royal-gold); 
            border-radius: 12px; 
            color: #b45309; 
            cursor: pointer; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.2s;
        }

        .media-btn:hover { background: var(--royal-gold); color: white; }

        .empty-state { text-align: center; padding: 60px; color: #94a3b8; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>📬 سجل زوار المقر الملكي</h2>
            <button class="btn-refresh" onclick="fetchMessages()">تحديث السجل 🔄</button>
        </div>
        
        <div id="messages-list">
            <div class="empty-state">جاري استدعاء البيانات الملكية...</div>
        </div>
    </div>

    <script>
        // الاتصال بقاعدة البيانات
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function fetchMessages() {
            const { data, error } = await _supabase
                .from('incoming_messages')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('messages-list');
            
            if (error) { 
                list.innerHTML = `<div class="empty-state">❌ خطأ في الاتصال: ${error.message}</div>`; 
                return; 
            }
            
            if (!data || data.length === 0) { 
                list.innerHTML = `<div class="empty-state">📭 لا توجد رسائل مسجلة حالياً.</div>`; 
                return; 
            }

            list.innerHTML = data.map(m => `
                <div class="msg-card">
                    <div class="user-info">
                        <div>
                            <span class="user-name">👤 ${m.full_name}</span> 
                            <span style="color:var(--royal-gold); font-size:0.9rem">@${m.username || 'n/a'}</span>
                        </div>
                        <span class="time">${new Date(m.created_at).toLocaleString('ar-EG')}</span>
                    </div>
                    <div class="content">
                        <span class="badge">${getArabicType(m.media_type)}</span> 
                        <div style="margin-top:10
