<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات | المقر الملكي 💰</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal-blue: #1e293b; --royal-gold: #c5a059; --bg-gray: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; direction: rtl; }
        .admin-nav { background: var(--royal-blue); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 4px solid var(--royal-gold); }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-btn { text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; color: white; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn:hover, .active { background: var(--royal-gold); border-color: var(--royal-gold); }
        .stat-card { background: white; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
<div class="container" style="max-width:1000px; margin:auto;">
    <div class="admin-nav">
        <h3 style="color:white; margin:0;">💰 المبيعات الملكية</h3>
        <div class="nav-links">
            <a href="admin.html" class="nav-btn">🏠 الرئيسية</a>
            <a href="admin-products.html" class="nav-btn">📦 المنتجات</a>
            <a href="admin-messages.html" class="nav-btn">📬 المراقبة</a>
            <a href="admin-sales.html" class="nav-btn active">💰 المبيعات</a>
            <a href="admin-users.html" class="nav-btn">👥 المستخدمين</a>
            <a href="admin-staff.html" class="nav-btn">👮 المشرفين</a>
        </div>
    </div>
    <div class="stat-card">
        <h2 style="color:var(--royal-blue)">سجل المبيعات قيد التفعيل 🚀</h2>
        <p>هنا سيظهر لك صافي الأرباح وطلبات الشحن الناجحة قريباً.</p>
        <div style="font-size: 4rem;">📊</div>
    </div>
</div>
</body>
</html>
