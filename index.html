<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المقر الملكي للشحن والخدمات</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal-blue: #1e293b; --gold: #c5a059; --accent: #0088cc; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; direction: rtl; color: #1e293b; overflow-x: hidden; }

        /* شاشة الانتظار (Coming Soon) */
        #coming-soon { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; text-align: center; padding: 20px; background: white; 
        }
        #coming-soon img { width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 25px; }
        #coming-soon h1 { color: var(--royal-blue); font-size: 24px; margin-bottom: 10px; }

        /* الهيدر الملكي */
        .header { 
            background: white; padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .header h1 { margin: 5px 0; font-size: 18px; color: var(--royal-blue); }
        .dice-anim { font-size: 20px; margin-top: 5px; letter-spacing: 5px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* شبكة المنتجات */
        #main-store { display: none; padding-bottom: 100px; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid #f1f5f9;
        }
        .product-card:active { transform: scale(0.96); }
        .product-card img { width: 100%; height: 140px; object-fit: cover; background: #eee; }
        .p-info { padding: 12px; }
        .p-info h3 { margin: 0; font-size: 14px; height: 38px; overflow: hidden; color: #334155; }
        .p-price { color: #10b981; font-weight: 800; font-size: 16px; margin-top: 8px; display: block; }

        /* شريط الأصدقاء (Leaderboard) */
        .friends-bar { background: white; margin: 20px 15px; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .friends-bar h4 { margin: 0 0 15px 0; font-size: 14px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
