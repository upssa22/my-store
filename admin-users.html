<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الزبائن</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        body { font-family: system-ui; background: #f4f7f6; padding: 20px; direction: rtl; }
        table { width: 100%; background: white; border-radius: 10px; overflow: hidden; border-collapse: collapse; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <a href="admin.html">← عودة</a>
    <h2>👥 إدارة مستخدمي المتجر</h2>
    <table>
        <thead><tr><th>الاسم</th><th>الـ ID</th><th id="p-label">النقاط</th><th>إجراء</th></tr></thead>
        <tbody id="users"></tbody>
    </table>
    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        document.getElementById('p-label').innerText = CONFIG.POINTS_NAME;
        async function load() {
            const { data } = await _supabase.from('users').select('*');
            document.getElementById('users').innerHTML = data.map(u => `
                <tr><td>${u.first_name}</td><td>${u.telegram_id}</td><td>${u.points}</td>
                <td><button onclick="edit(${u.telegram_id}, ${u.points})">تعديل</button></td></tr>`).join('');
        }
        async function edit(id, cur) {
            const val = prompt(`رصيد ${CONFIG.POINTS_NAME}:`, cur);
            if(val) { await _supabase.from('users').update({points: parseInt(val)}).eq('telegram_id', id); load(); }
        }
        load();
    </script>
</body>
</html>
