<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المنتجات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        body { font-family: system-ui; background: #f4f7f6; padding: 20px; direction: rtl; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .prod-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-status { background: #f39c12; color: white; border: none; padding: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="admin.html">← عودة</a>
    <div class="card">
        <h2>📦 إضافة منتج جديد</h2>
        <input type="text" id="p-name" placeholder="الاسم" style="width:100%; padding:10px; margin:5px 0;">
        <input type="number" id="p-price" placeholder="السعر" style="width:100%; padding:10px; margin:5px 0;">
        <button onclick="save()" style="width:100%; padding:10px; background:#0088cc; color:white; border:none; border-radius:10px; cursor:pointer;">حفظ ✅</button>
    </div>
    <div class="card" id="list">جاري التحميل...</div>

    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function load() {
            const { data } = await _supabase.from('products').select('*').order('id', {ascending:false});
            document.getElementById('list').innerHTML = data.map(p => `
                <div class="prod-row">
                    <span>${p.name} (${p.status})</span>
                    <button class="btn-status" onclick="toggle(${p.id}, '${p.status}')">تغيير الحالة</button>
                </div>`).join('');
        }
        async function save() {
            await _supabase.from('products').insert([{ name: document.getElementById('p-name').value, price: document.getElementById('p-price').value, status: 'active' }]);
            load();
        }
        async function toggle(id, cur) {
            await _supabase.from('products').update({ status: cur === 'active' ? 'disabled' : 'active' }).eq('id', id);
            load();
        }
        load();
    </script>
</body>
</html>
