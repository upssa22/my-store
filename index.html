<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر مونوپولي جو</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #0088cc; --secondary-color: #31b545; --bg-color: #efeff4; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; direction: rtl; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .box { background: white; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .price-tag { font-size: 24px; color: var(--secondary-color); font-weight: bold; margin: 15px 0; }
        .payment-info { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px dashed var(--main-color); margin: 20px 0; cursor: pointer; }
        .btn { border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-add { background: var(--main-color); color: white; }
        .btn-back { background: #8e8e93; color: white; }
    </style>
</head>
<body>

    <div id="main-page" class="page active-page">
        <h2 style="text-align: center;">🛍️ متجر مونوپولي جو</h2>
        <div id="items-list">
            <div class="item-card" onclick="openDetails('🃏 ملصقات', 'باقات ملصقات حصرية ونادرة.', '5$')"><h3>🃏 ملصقات</h3> <span>◀</span></div>
            <div class="item-card" onclick="openDetails('⭐ نجوم', 'شحن نجوم تلجرام آمن وفوري.', '10$')"><h3>⭐ نجوم</h3> <span>◀</span></div>
            <div class="item-card" onclick="openDetails('🤝 حدث الشراكة', 'تفعيل كامل لميزات حدث الشراكة.', '15$')"><h3>🤝 حدث الشراكة</h3> <span>◀</span></div>
            <div class="item-card" onclick="openDetails('🏎️ حدث السباق', 'المساعدة في تصدر السباق.', '12$')"><h3>🏎️ حدث السباق</h3> <span>◀</span></div>
            <div class="item-card" onclick="openDetails('🔥 ثغره', 'شرح وتطبيق أقوى الثغرات.', '20$')"><h3>🔥 ثغره</h3> <span>◀</span></div>
            <div class="item-card" onclick="openDetails('👥 شريط الأصدقاء', 'إضافة أصدقاء نشطين لحسابك.', '8$')"><h3>👥 شريط الأصدقاء</h3> <span>◀</span></div>
        </div>
    </div>

    <div id="details-page" class="page">
        <div class="box">
            <h2 id="det-title"></h2>
            <p id="det-desc"></p>
            <div id="det-price" class="price-tag"></div>
            <button class="btn btn-add" onclick="addToCart()">🛒 إضافة للسلة</button>
            <button class="btn btn-back" onclick="showPage('main-page')">رجوع</button>
        </div>
    </div>

    <div id="checkout-page" class="page">
        <div class="box">
            <h2>💳 تأكيد الدفع</h2>
            <p>يرجى التحويل للحساب التالي:</p>
            <div class="payment-info" onclick="copyIBAN()">
                <span>اضغط للنسخ 📋</span>
                <code id="iban-text">SA00 0000 0000 0000 0000</code>
            </div>
            <p style="font-size: 13px; color: #888;">عند الضغط على "إرسال"، سيتم طلبك فوراً. يرجى إرفاق صورة التحويل بعدها.</p>
            <button class="btn btn-back" onclick="showPage('main-page')">إلغاء</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let selectedProduct = "";

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            if(pageId === 'main-page' && cart.length === 0) tg.MainButton.hide();
        }

        function openDetails(name, desc, price) {
            selectedProduct = { name, price };
            document.getElementById('det-title').innerText = name;
            document.getElementById('det-desc').innerText = desc;
            document.getElementById('det-price').innerText = price;
            showPage('details-page');
        }

        function addToCart() {
            cart.push(selectedProduct);
            tg.MainButton.setText(`إتمام الطلب (${cart.length}) 🚀`);
            tg.MainButton.show();
            showPage('main-page');
        }

        function copyIBAN() {
            navigator.clipboard.writeText(document.getElementById('iban-text').innerText);
            tg.showAlert("تم النسخ ✅");
        }

        tg.onEvent('mainButtonClicked', function() {
            if (document.getElementById('checkout-page').classList.contains('active-page')) {
                let orderSummary = "📦 طلب جديد:\n" + cart.map((item, index) => `${index + 1}- ${item.name} (${item.price})`).join('\n');
                // الإرسال التلقائي المباشر
                tg.sendData(orderSummary);
                tg.close();
            } else {
                showPage('checkout-page');
                tg.MainButton.setText("✅ إرسال الطلب الآن (تلقائي)");
            }
        });
    </script>
</body>
</html>
