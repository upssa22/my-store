<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المقر الملكي للشحن والخدمات</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal-blue: #1e293b; --gold: #c5a059; --accent: #0088cc; --bg: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; direction: rtl; color: #1e293b; }

        /* شاشة الانتظار */
        #coming-soon { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; text-align: center; padding: 20px; background: white; box-sizing: border-box;
        }
        #coming-soon img { width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 25px; }
        
        /* المتجر الرئيسي */
        #main-store { display: none; padding-bottom: 50px; }
        .header { background: white; padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .dice-anim { font-size: 20px; margin-top: 5px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; background: #eee; }
        .p-info { padding: 12px; }
        .p-price { color: #10b981; font-weight: 800; font-size: 16px; margin-top: 5px; display: block; }

        /* شريط الأصدقاء */
        .friends-bar { background: white; margin: 20px 15px; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .friends-list { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .friend { flex-shrink: 0; text-align: center; width: 65px; }
        .friend img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); padding: 2px; }
        .friend span { display: block; font-size: 10px; margin-top: 5px; color: #64748b; }
        
        .error-msg { color: #e74c3c; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="coming-soon">
        <div id="m-content">
            <p>جاري فحص الاتصال بالمقر الملكي... 🏗️</p>
        </div>
        <small id="user-tag" style="color:#cbd5e1; margin-top:15px;"></small>
    </div>

    <div id="main-store">
        <div class="header">
            <div style="font-size: 30px;">👑</div>
            <h1 id="store-title-ui" style="margin:5px 0; font-size:18px;">المقر الملكي للشحن</h1>
            <div class="dice-anim">🎲 🏁 🎲</div>
        </div>
        <div class="products-grid" id="products-list"></div>
        
        <div class="friends-bar">
            <h4 style="margin:0 0 10px 0; font-size:14px; color:var(--gold);">🏆 قائمة المتصدرين</h4>
            <div class="friends-list">

                <div class="friend"><img src="https://i.pravatar.cc/100?u=2"><span>فهد_التاجر</span></div>
                <div class="friend"><img src="https://i.pravatar.cc/100?u=3"><span>قراصنة_الشرق</span></div>
