<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقر الملكي | لوحة التحكم 👑</title>
    <style>
        :root { --royal-blue: #1e293b; --royal-gold: #c5a059; --bg-gray: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gray); margin: 0; padding: 0; direction: rtl; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .admin-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 90%; border-top: 8px solid var(--royal-gold); }
        h1 { color: var(--royal-blue); margin-bottom: 30px; font-size: 1.8rem; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .menu-btn { 
            text-decoration: none; padding: 18px; border-radius: 15px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-products { background: var(--royal-blue); color: white; }
        .btn-products:hover { background: #334155; transform: scale(1.03); }
        /* زر المراقبة الجديد */
        .btn-monitor { background: #0ea5e9; color: white; }
        .btn-monitor:hover { background: #0284c7; transform: scale(1.03); }
        
        .btn-store { background: #f1f5f9; color: var(--royal-blue); border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="admin-box">
        <div style="font-size: 3rem; margin-bottom: 10px;">🏰</div>
        <h1>لوحة التحكم الملكية</h1>
        <div class="menu-grid">
            <a href="admin-products.html" class="menu-btn btn-products">📦 إدارة ملصقات منوبولي</a>
            <a href="admin-messages.html" class="menu-btn btn-monitor">🛡️ شاشة المراقبة والوسائط</a>
            <a href="index.html" target="_blank" class="menu-btn btn-store">🌐 زيارة المتجر</a>
        </div>
    </div>
</body>
</html>
