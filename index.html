<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر مونوپولي جو الاحترافي</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #0088cc; --secondary-color: #31b545; --bg-color: #efeff4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; color: #000; direction: rtl; }
        
        /* نظام الصفحات */
        .page { display: none; animation: fadeIn 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الكروت والقوائم */
        .item-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .item-info h3 { margin: 0; font-size: 18px; color: #333; }
        .arrow { color: #ccc; font-size: 20px; }

        /* صفحة التفاصيل والدفع */
        .box { background: white; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .price-tag { font-size: 24px; color: var(--secondary-color); font-weight: bold; margin: 15px 0; }
        .payment-info { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px dashed var(--main-color); margin: 20px 0; cursor: pointer; }
        .payment-info code { display: block; font-size: 18px; color: #333; margin-top: 5px; font-weight: bold; }

        /* الأزرار */
        .btn { border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-top: 10px; }
        .btn-add { background: var(--main-color); color: white; }
        .btn-back { background: #8e8e93; color: white; margin-top: 10px; }
        .btn:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="main-page" class="page active-page">
        <h2 style="text-align: center;">🛍️ متجر مونوپولي جو</h2>
        <div id="items-list">
            <div class="item-card" onclick="openDetails('🃏 ملصقات', 'باقات ملصقات حصرية ونادرة لإكمال مجموعتك.', '5$')">
                <div class="item-info"><h3>🃏 ملصقات</h3></div> <div class="arrow">◀</div>
            </div>
            <div class="item-card" onclick="openDetails('⭐ نجوم', 'شحن نجوم تلجرام آمن وفوري.', '10$')">
                <div class="item-info"><h3>⭐ نجوم</h3></div> <div class="arrow">◀</div>
            </div>
            <div class="item-card" onclick="openDetails('🤝 حدث الشراكة', 'تفعيل كامل لميزات حدث الشراكة والجوائز.', '15$')">
                <div class="item-info"><h3>🤝 حدث الشراكة</h3></div> <div class="arrow">◀</div>
            </div>
            <div class="item-card" onclick="openDetails('🏎️ حدث السباق', 'المساعدة في تصدر السباق والحصول على المراكز الأولى.', '12$')">
                <div class="item-info"><h3>🏎️ حدث السباق</h3></div> <div class="arrow">◀</div>
            </div>
            <div class="item-card" onclick="openDetails('🔥 ثغره', 'شرح وتطبيق أقوى الثغرات لزيادة مواردك.', '20$')">
                <div class="item-info"><h3>🔥 ثغره</h3></div> <div class="arrow">◀</div>
            </div>
            <div class="item-card" onclick="openDetails('👥 شريط الأصدقاء', 'إضافة أصدقاء نشطين لزيادة الهدايا.', '8$')">
                <div class="item-info"><h3>👥 شريط الأصدقاء</h3></div> <div class="arrow">◀</div>
            </div>
        </div>
    </div>

    <div id="details-page" class="page">
        <div class="box">
            <h2 id="det-title"></h2>
            <p id="det-desc" style="color: #666;"></p>
            <div id="det-price" class="price-tag"></div>
            <button class="btn btn-add" onclick="addToCart()">🛒 إضافة للسلة</button>
            <button class="btn btn-back" onclick="showPage('main-page')">رجوع للقائمة</button>
        </div>
    </div>

    <div id="checkout-page" class="page">
        <div class="box">
            <h2>💳 معلومات الدفع</h2>
            <p>لإتمام الطلب، يرجى التحويل إلى الحساب التالي:</p>
            <div class="payment-info" onclick="copyIBAN()">
                <span>اضغط للنسخ 📋</span>
                <code id="iban-text">SA00 0000 0000 0000 0000</code> </div>
            <p style="font-size: 14px; color: #888;">بعد التحويل، اضغط على زر "إرسال الطلب" في الأسفل وأرسل صورة التحويل في المحادثة.</p>
            <button class="btn btn-back" onclick="showPage('main-page')">إلغاء والعودة</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];
        let selectedProduct = "";

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            window.scrollTo(0, 0);
            
            // إخفاء زر التلجرام الرئيسي عند العودة للقائمة لترتيب الواجهة
            if(pageId === 'main-page' && cart.length === 0) tg.MainButton.hide();
        }

        function openDetails(name, desc, price) {
            selectedProduct = { name, price };
            document.getElementById('det-title').innerText = name;
            document.getElementById('det-desc').innerText = desc;
            document.getElementById('det-price').innerText = price;
            showPage('details-page');
        }

        function addToCart() {
            cart.push(selectedProduct);
            
            // تفعيل زر التلجرام المدمج (Main Button)
            tg.MainButton.setText(`إتمام الطلب والدفع (${cart.length}) 🚀`);
            tg.MainButton.setParams({ color: "#31b545", is_visible: true });
            tg.MainButton.show();

            showPage('main-page');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function copyIBAN() {
            let iban = document.getElementById('iban-text').innerText;
            navigator.clipboard.writeText(iban);
            tg.showAlert("تم نسخ رقم الحساب بنجاح ✅");
        }

        // التعامل مع ضغطة زر التلجرام الرئيسي (MainButton)
        tg.onEvent('mainButtonClicked', function() {
            if (document.getElementById('checkout-page').classList.contains('active-page')) {
                // إذا كان في صفحة الدفع وضغط الزر، يتم الإرسال
                finalizeOrder();
            } else {
                // إذا كان في القائمة وضغط الزر، يذهب لصفحة الدفع
                showPage('checkout-page');
                tg.MainButton.setText("✅ إرسال الطلب الآن");
            }
        });

        function finalizeOrder() {
            let orderSummary = "📦 طلب جديد:\n" + cart.map((item, index) => `${index + 1}- ${item.name} (${item.price})`).join('\n');
            orderSummary += "\n\n⚠️ يرجى إرسال صورة التحويل الآن لتأكيد الطلب.";
            
            tg.sendData(orderSummary);
            tg.close();
        }
    </script>
</body>
</html>
