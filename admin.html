<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | المقر الملكي 👑</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; direction: rtl; }
        .admin-container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 400px; border-top: 8px solid #c5a059; }
        .admin-menu { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .menu-item { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px; text-decoration: none; color: white; border-radius: 15px; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .menu-item:hover { transform: translateY(-3px); opacity: 0.9; }
        /* ألوان الأزرار الأصلية */
        .products { background: #4f46e5; }
        .monitor  { background: #0ea5e9; }
        .sales    { background: #10b981; }
        .settings { background: #f59e0b; }
        .staff    { background: #1e293b; }
        .logout   { background: #ef4444; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div style="font-size: 3.5rem;">🏰</div>
        <h1>المقر الملكي</h1>
        <div class="admin-menu">
            <a href="admin-products.html" class="menu-item products">📦 إدارة الملصقات</a>
            <a href="admin-messages.html" class="menu-item monitor">🛡️ شاشة المراقبة</a>
            <a href="admin-sales.html" class="menu-item sales">💰 سجل المبيعات</a>
            <a href="admin-staff.html" class="menu-item staff">👮 المشرفين</a>
            <a href="admin-settings.html" class="menu-item settings">⚙️ الإعدادات</a>
            <a href="index.html" class="menu-item logout">🚪 خروج للمتجر</a>
        </div>
    </div>
</body>
</html>
