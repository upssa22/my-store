<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>المراقبة الملكية 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; direction: rtl; }
        .nav { background: #1e293b; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 4px solid #c5a059; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid #c5a059; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .media-btn { background: #fffbeb; border: 1px solid #c5a059; padding: 10px; border-radius: 10px; cursor: pointer; color: #b45309; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <h2>📬 سجل الرسائل والوسائط</h2>
        <a href="admin.html" style="color:white; text-decoration:none;">🏠 الرئيسية</a>
    </div>
    <div id="list"></div>
    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function load() {
            const { data } = await _supabase.from('incoming_messages').select('*').order('created_at', {ascending: false});
            document.getElementById('list').innerHTML = data.map(m => `
                <div class="card">
                    <b>👤 ${m.full_name} (@${m.username})</b> <small>${new Date(m.created_at).toLocaleString('ar-EG')}</small>
                    <div style="margin:10px 0;">${m.message_text || '(رسالة وسائط)'}</div>
                    ${m.media_file_id ? `<button class="media-btn" onclick="window.open('/api/get-media?fileId=${m.media_file_id}')">👁️ فتح الوسائط</button>` : ''}
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
