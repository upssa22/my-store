<!DOCTYPE html>
<html lang="ar" dir="rtl">

        .active { background: var(--royal-gold); }
        .content { background: white; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #e2e8f0; }

    <div class="admin-nav">
        <h3 style="color:white; margin:0;">👥 سجل الزبائن</h3>
        <div class="nav-links">
            <a href="admin.html" class="nav-btn">🏠 الرئيسية</a>
            <a href="admin-products.html" class="nav-btn">📦 المنتجات</a>
            <a href="admin-messages.html" class="nav-btn">📬 المراقبة</a>
            <a href="admin-users.html" class="nav-btn active">👥 المستخدمين</a>
            <a href="admin-settings.html" class="nav-btn">⚙️ الإعدادات</a>
        </div>
    </div>
    <div class="content">
        <h2 style="color:var(--royal-blue)">قاعدة بيانات المستخدمين 🔐</h2>
        <p>هنا ستتمكن من رؤية يوزرات التليجرام لكل زبائنك وتاريخ أول تواصل لهم.</p>
        <div style="font-size: 4rem;">📂</div>
    </div>
</div>
</body>
</html>
