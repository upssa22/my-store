<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | المقر الملكي 👑</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }
        .admin-container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h1 { color: #1e293b; margin-bottom: 25px; }
        
        .admin-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* تصميم الأزرار كما كانت في نسختك القديمة */
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .menu-item:active { transform: scale(0.95); }
        .menu-item:hover { opacity: 0.9; }

        /* الألوان الأصلية لكل قسم */
        .products { background-color: #4f46e5; } /* بنفسجي/أزرق المنتجات */
        .monitor  { background-color: #0ea5e9; } /* أزرق سماوي للمراقبة - الجديد */
        .admins    { background-color: #10b981; } /* أخضر المشرفين */
        .appearance { background-color: #f59e0b; } /* برتقالي المظهر */
        .stats     { background-color: #6366f1; } /* إحصائيات */
        .logout    { background-color: #ef4444; margin-top: 10px; } /* أحمر خروج */

        .icon { font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>👑 لوحة التحكم</h1>
        
        <div class="admin-menu">
            <a href="admin-products.html" class="menu-item products">
                <span class="icon">📦</span> إدارة المنتجات
            </a>

            <a href="admin-messages.html" class="menu-item monitor">
                <span class="icon">🛡️</span> شاشة المراقبة والوسائط
            </a>

            <a href="#" class="menu-item admins">
                <span class="icon">👥</span> إدارة المشرفين
            </a>

            <a href="#" class="menu-item appearance">
                <span class="icon">🎨</span> تخصيص المظهر
            </a>

            <a href="#" class="menu-item stats">
                <span class="icon">📊</span> إحصائيات المتجر
            </a>

            <a href="index.html" class="menu-item logout">
                <span class="icon">🚪</span> خروج من المقر
            </a>
        </div>
    </div>

</body>
</html>
