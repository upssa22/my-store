<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>المقر الملكي | الإدارة 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; direction: rtl; }
        .nav { background: #1e293b; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; border-bottom: 4px solid #c5a059; }
        .content { background: white; padding: 50px; border-radius: 20px; margin-top: 20px; text-align: center; border: 1px solid #e2e8f0; color: #64748b; }
    </style>
</head>
<body>
    <div class="nav">
        <h2 id="page-title">إدارة القسم</h2>
        <a href="admin.html" style="color:white; text-decoration:none;">🏠 الرئيسية</a>
    </div>
    <div class="content">
        <h2 id="msg">هذه الصفحة قيد التطوير البرمجي 🏗️</h2>
        <p>سيتم ربط بيانات هذا القسم بقاعدة البيانات قريباً.</p>
        <div style="font-size: 5rem;">🚧</div>
    </div>
    <script>
        // كود بسيط لتغيير العنوان حسب اسم الملف
        const path = window.location.pathname;
        if(path.includes('sales')) document.getElementById('page-title').innerText = "💰 سجل المبيعات";
        if(path.includes('users')) document.getElementById('page-title').innerText = "👥 سجل المستخدمين";
        if(path.includes('staff')) document.getElementById('page-title').innerText = "👮 إدارة المشرفين";
    </script>
</body>
</html>
