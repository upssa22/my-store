<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>لوحة التحكم | المقر الملكي 👑</title>
    <style>
        :root { --royal-blue: #1e293b; --royal-gold: #c5a059; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; direction: rtl; }
        .admin-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 400px; border-top: 8px solid var(--royal-gold); }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; }
        .menu-item { text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .products { background: #4f46e5; } .monitor { background: #0ea5e9; } .sales { background: #10b981; } .settings { background: #64748b; }
        .menu-item:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="admin-box">
        <div style="font-size: 3rem;">🏰</div>
        <h1>لوحة التحكم الملكية</h1>
        <div class="menu-grid">
            <a href="admin-products.html" class="menu-item products">📦 إدارة المنتجات</a>
            <a href="admin-messages.html" class="menu-item monitor">🛡️ شاشة المراقبة</a>
            <a href="admin-sales.html" class="menu-item sales">💰 سجل المبيعات</a>
            <a href="admin-users.html" class="menu-item settings">👥 المستخدمين</a>
            <a href="admin-staff.html" class="menu-item settings" style="background:#1e293b">👮 المشرفين</a>
            <a href="admin-settings.html" class="menu-item settings" style="background:#f59e0b">⚙️ الإعدادات</a>
            <a href="index.html" class="menu-item" style="background:#ef4444; margin-top:10px;">🚪 خروج</a>
        </div>
    </div>
</body>
</html>
