<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقر الملكي | الإدارة الشاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal: #1e293b; --gold: #c5a059; --accent: #3b82f6; --bg: #f1f5f9; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; direction: rtl; color: #334155; }
        
        /* الهيدر */
        .admin-header { background: var(--royal); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); position: sticky; top:0; z-index:100; }
        .container { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 320px 1fr; gap: 20px; padding: 0 20px; }
        
        /* البطاقات */
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        
        /* الأزرار */
        .btn-blue { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .btn-edit { background: #6366f1; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }

        /* الحقول الديناميكية */
        .dynamic-field-row { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; position: relative; }
        .remove-field { position: absolute; top: 5px; left: 5px; color: #ef4444; cursor: pointer; font-size: 22px; font-weight: bold; width: 30px; height: 30px; text-align: center; }

        /* قائمة المنتجات */
        .product-item { display: flex; align-items: center; gap: 15px; background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; transition: 0.2s; }
        .product-item:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .product-item img { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: #f1f5f9; }
        .cat-badge { background: #dbeafe; color: #1e40af; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        
        #p-preview-img { width: 100%; max-height: 250px; object-fit: contain; margin-top: 10px; border-radius: 12px; display: none; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>👑 إدارة المقر الملكي المتقدمة</h1>
    <div style="margin-top:10px;">
        <button onclick="location.href='admin.html'" style="color:white; background:none; border:1px solid white; padding:6px 20px; border-radius:20px; cursor:pointer; font-weight:bold;">⬅️ العودة للرئيسية</button>
    </div>
</div>

<div class="container">
    <aside>
        <div class="card">
            <h3>📂 الأقسام (Categories)</h3>
            <input type="text" id="new-cat-name" placeholder="اسم القسم الجديد">
            <button class="btn-blue" onclick="addCategory()">+ إضافة قسم</button>
            <div id="cats-list" style="margin-top: 20px;">
                </div>
        </div>
    </aside>

    <main>
        <div class="card">
            <h3 id="form-title">➕ إضافة منتج جديد</h3>
            <input type="hidden" id="edit-id">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <input type="text" id="p-name" placeholder="اسم المنتج">
                <input type="number" id="p-price" placeholder="السعر ($)">
            </div>

            <select id="p-category">
                <option value="">-- اختر القسم --</option>
            </select>

            <div style="border: 2px dashed var(--gold); padding: 20px; text-align: center; border-radius: 15px; cursor: pointer; background: #fffcf5;" onclick="document.getElementById('file-input').click()">
                <span id="u-status">🖼️ اضغط لرفع صورة المنتج الملكي</span>
                <input type="file" id="file-input" hidden accept="image/*" onchange="uploadImg(this)">
            </div>
            <input type="hidden" id="p-img">
            <img id="p-preview-img" src="">

            <div style="margin-top: 25px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b>🛠️ بيانات مطلوبة من الزبون:</b>
                    <button onclick="addNewFieldRow()" style="background:var(--royal); color:white; border:none; padding:6px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">+ أضف حقل</button>
                </div>
                <div id="dynamic-fields-container" style="margin-top:15px;">
                    </div>
            </div>

            <button class="btn-gold" id="save-btn" onclick="saveProduct()">نشر المنتج في المقر ✅</button>
            <button id="cancel-btn" onclick="resetForm()" style="display:none; width:100%; background:none; border:none; color:#ef4444; margin-top:12
