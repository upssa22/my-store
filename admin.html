<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة مونوپولي ستور ⚙️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        :root { --main: #0088cc; --dark: #2c3e50; --danger: #e74c3c; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--dark); }
        .login-box { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        #main-panel { display: none; }
        .sidebar { width: 250px; height: 100vh; background: var(--dark); color: white; position: fixed; right: 0; padding: 20px; }
        .sidebar button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: transparent; color: #ccc; text-align: right; cursor: pointer; }
        .sidebar button.active { background: var(--main); color: white; }
        .content { margin-right: 250px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 12px; text-align: center; border-right: 4px solid var(--main); }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        .btn-action { background: var(--main); color: white; border: none; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>دخول الإدارة 🔒</h2>
        <input type="email" id="l-email" placeholder="البريد الإلكتروني">
        <input type="password" id="l-pass" placeholder="كلمة المرور">
        <button class="btn-action" onclick="login()">دخول</button>
    </div>
</div>

<div id="main-panel">
    <div class="sidebar">
        <h3>مونوپولي ستور</h3>
        <button onclick="showTab('tab-dash', this)" class="active">📊 الإحصائيات</button>
        <button onclick="showTab('tab-prod', this)">📦 المنتجات</button>
        <button onclick="showTab('tab-sales', this)">🧾 المبيعات</button>
        <button onclick="showTab('tab-users', this)">👥 الزبائن</button>
        <button onclick="location.reload()" style="color:red">تسجيل خروج</button>
    </div>

    <div class="content">
        <div id="tab-dash" class="tab-content active-tab">
            <div class="stats">
                <div class="stat-item">المنتجات: <b id="s-p">0</b></div>
                <div class="stat-item">المبيعات: <b id="s-s">0</b></div>
                <div class="stat-item">الأرباح: <b id="s-m">0$</b></div>
            </div>
            <div class="card"><h3>آخر النشاطات</h3><div id="dash-log">لا توجد بيانات حالياً.</div></div>
        </div>

        <div id="tab-prod" class="tab-content" style="display:none">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="card">
                    <h3>➕ إضافة منتج</h3>
                    <input type="text" id="p-name" placeholder="اسم المنتج">
                    <select id="p-cat"><option>ملصقات</option><option>شحن</option><option>حسابات</option></select>
                    <input type="number" id="p-price" placeholder="السعر">
                    <input type="text" id="p-img" placeholder="رابط الصورة">
                    <input type="text" id="p-fields" placeholder="الخانات المطلوبة (الاسم, الايدي)">
                    <textarea id="p-desc" placeholder="وصف المنتج (ضع رابط يوتيوب هنا للمساعدة)"></textarea>
                    <button class="btn-action" onclick="saveProduct()">نشر المنتج ✅</button>
                </div>
                <div class="card"><h3>📦 قائمة المنتجات</h3><div id="prod-list"></div></div>
            </div>
        </div>

        <div id="tab-users" class="tab-content" style="display:none">
            <div class="card">
                <h3>👥 إدارة الزبائن</h3>
                <table><thead><tr><th>الاسم</th><th>النرد</th><th>إجراء</th></tr></thead><tbody id="user-list"></tbody></table>
            </div>
        </div>

        <div id="tab-sales" class="tab-content" style="display:none">
            <div class="card"><h3>🧾 سجل المبيعات</h3><div id="sales-list"></div></div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://roljlpmrgkuzeumviobn.supabase.co';
    const S_KEY = 'sb_publishable_mEf2kXqJsivTvismRbM8cQ_RGeuii9q';
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let currentStaff = null;

    async function login() {
        const e = document.getElementById('l-email').value;
        const p = document.getElementById('l-pass').value;
        const { data, error } = await _supabase.from('staff').select('*').eq('email', e).eq('password', p).single();
        if(error) return alert("خطأ في البيانات!");
        currentStaff = data;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('main-panel').style.display='block';
        loadDash();
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display='none');
        document.getElementById(id).style.display='block';
        document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id==='tab-prod') loadProd();
        if(id==='tab-users') loadUsers();
        if(id==='tab-sales') loadSales();
    }

    async function loadDash() {
        const { data: p } = await _supabase.from('products').select('*');
        const { data: s } = await _supabase.from('sales').select('*');
        document.getElementById('s-p').innerText = p.length;
        document.getElementById('s-s').innerText = s.length;
        document.getElementById('s-m').innerText = s.reduce((a,b)=>a+b.price, 0) + "$";
    }

    async function saveProduct() {
        await _supabase.from('products').insert([{
            name: document.getElementById('p-name').value,
            category: document.getElementById('p-cat').value,
            price: parseFloat(document.getElementById('p-price').value),
            image_url: document.getElementById('p-img').value,
            required_fields: document.getElementById('p-fields').value,
            description: document.getElementById('p-desc').value,
            status: currentStaff.role === 'admin' ? 'active' : 'pending'
        }]);
        alert("تم الحفظ!"); loadProd();
    }

    async function loadProd() {
        const { data } = await _supabase.from('products').select('*');
        document.getElementById('prod-list').innerHTML = data.map(i => `
            <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between;">
                <span>${i.name} (${i.status})</span>
                ${currentStaff.role==='admin'?`<button onclick="delP(${i.id})" style="background:red; color:white; border:none; padding:4px;">حذف</button>`:''}
            </div>`).join('');
    }

    async function delP(id) { await _supabase.from('products').delete().eq('id',id); loadProd(); }

    async function loadUsers() {
        const { data } = await _supabase.from('users').select('*');
        document.getElementById('user-list').innerHTML = data.map(u => `
            <tr><td>${u.first_name}</td><td><b>${u.points}</b></td>
            <td><button onclick="editP(${u.telegram_id},${u.points})">تعديل</button></td></tr>`).join('');
    }

    async function editP(id, cur) {
        const p = prompt("النرد الجديد:", cur);
        if(p) { await _supabase.from('users').update({points: parseInt(p)}).eq('telegram_id', id); loadUsers(); }
    }

    async function loadSales() {
        const { data } = await _supabase.from('sales').select('*').order('id',{ascending:false});
        document.getElementById('sales-list').innerHTML = data.map(s => `
            <div class="card" style="font-size:12px;"><b>${s.product_name}</b> - ${s.customer_name}<br>${s.details}</div>`).join('');
    }
</script>
</body>
</html>
