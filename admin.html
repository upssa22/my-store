<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الرئيسية ⚙️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script> <style>
        :root { --main: #0088cc; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: system-ui; background: var(--bg); margin: 0; direction: rtl; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 40px; border-radius: 25px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,88,204,0.15); border: 1px solid var(--main); }
        .icon { font-size: 50px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <div style="background: var(--dark); color: white; padding: 30px; text-align: center;">
        <h1 id="store-title">جاري التحميل...</h1>
    </div>

    <div class="grid">
        <div class="card" onclick="location.href=CONFIG.PATH_PRODUCTS">
            <span class="icon">📦</span>
            <h3>إدارة المنتجات</h3>
        </div>
        <div class="card" onclick="location.href=CONFIG.PATH_USERS">
            <span class="icon">👥</span>
            <h3>إدارة الزبائن</h3>
        </div>
        <div class="card" onclick="location.href=CONFIG.PATH_SALES">
            <span class="icon">🧾</span>
            <h3>سجل المبيعات</h3>
        </div>
        <div class="card" onclick="location.href=CONFIG.PATH_STAFF">
            <span class="icon">👮</span>
            <h3>طاقم العمل</h3>
        </div>
    </div>

    <script>
        // استخدام الإعدادات من الملف الموحد
        document.title = "لوحة تحكم " + CONFIG.STORE_NAME;
        document.getElementById('store-title').innerText = CONFIG.STORE_NAME;
    </script>
</body>
</html>
