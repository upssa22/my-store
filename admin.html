<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | مونوپولي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --main: #0088cc; --dark: #2c3e50; --bg: #f0f2f5; }
        body { font-family: system-ui; background: var(--bg); margin: 0; direction: rtl; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,136,204,0.2); }
    </style>
</head>
<body>
    <div style="background:var(--dark); color:white; padding:20px; text-align:center;">
        <h1 id="title">لوحة التحكم</h1>
    </div>
    <div class="grid">
        <div class="card" onclick="location.href=CONFIG.PATH_PRODUCTS"><h3>📦 المنتجات</h3></div>
        <div class="card" onclick="location.href=CONFIG.PATH_USERS"><h3>👥 الزبائن</h3></div>
        <div class="card" onclick="location.href=CONFIG.PATH_SALES"><h3>🧾 المبيعات</h3></div>
        <div class="card" onclick="location.href=CONFIG.PATH_STAFF"><h3>👮 الطاقم</h3></div>
    </div>
    <script>
        document.getElementById('title').innerText = CONFIG.STORE_NAME;
    </script>
</body>
</html>
