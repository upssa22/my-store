<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الأمان والطاقم</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
</head>
<body style="font-family:system-ui; background:#f4f7f6; padding:20px; direction:rtl;">
    <a href="admin.html">← عودة</a>
    <div style="background:white; padding:20px; border-radius:15px; margin-top:20px;">
        <h2>👤 إعدادات حسابي</h2>
        <input type="text" id="my-name" placeholder="الاسم" style="display:block; width:100%; padding:10px; margin:5px 0;">
        <input type="password" id="my-pass" placeholder="كلمة مرور جديدة" style="display:block; width:100%; padding:10px; margin:5px 0;">
        <button onclick="update()" style="width:100%; padding:10px; background:green; color:white; border:none; border-radius:10px; cursor:pointer;">تحديث بياناتي 🔒</button>
    </div>
    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        // ملاحظة: يتم جلب الـ ID من نظام تسجيل الدخول لاحقاً
        async function update() {
            const { error } = await _supabase.from('staff').update({
                full_name: document.getElementById('my-name').value,
                password: document.getElementById('my-pass').value
            }).eq('email', 'admin@store.com'); // مثال
            if(!error) alert("تم التحديث!");
        }
    </script>
</body>
</html>
