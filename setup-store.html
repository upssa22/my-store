<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأسيس المتجر | منصة التجارة الذكية 🚀</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --success: #10b981; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        .setup-container { max-width: 550px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--accent); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); font-size: 1.8rem; margin: 0 0 10px 0; }
        .form-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn-launch { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-otp { background: var(--accent); margin-bottom: 15px; font-size: 0.9rem; padding: 10px; }
        .otp-section { display: none; background: #f1f5f9; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px dashed var(--accent); }
        .success-box { display: none; text-align: center; padding: 30px; background: #f0fdf4; border-radius: 20px; border: 1px solid #bbf7d0; }
        .help-text { font-size: 0.75rem; color: #64748b; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="setup-container">
    <div id="setup-form">
        <div class="header">
            <h1>تأسيس متجرك الجديد 🚀</h1>
            <p>أدخل البيانات الأساسية لربط البوت وتفعيل نظام التحقق.</p>
        </div>

        <div class="form-group">
            <label>📧 البريد الإلكتروني (للدخول للإدارة):</label>
            <input type="email" id="owner-email" placeholder="admin@example.com" required>
        </div>

        <div class="form-group">
            <label>🔑 كلمة المرور:</label>
            <input type="password" id="owner-pass" placeholder="كلمة مرور قوية" required>
        </div>

        <div class="form-group">
            <label>🤖 توكن بوت التليجرام:</label>
            <input type="text" id="bot-token" placeholder="123456789:ABCdefG..." required>
            <span class="help-text">يجب أن يكون البوت شغالاً لإرسال كود التحقق.</span>
        </div>

        <div class="form-group">
            <label>🆔 معرف التليجرام الخاص بك (Chat ID):</label>
            <input type="number" id="chat-id" placeholder="مثلاً: 123456789">
            <span class="help-text">احصل عليه من بوت <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a></span>
        </div>

        <button class="btn-launch btn-otp" id="otp-btn" onclick="sendOTP()">إرسال كود التحقق عبر التليجرام 💬</button>

        <div id="otp-area" class="otp-section">
            <label>🔢 أدخل كود التحقق المستلم:</label>
            <input type="text" id="user-otp" placeholder="أدخل 6 أرقام هنا">
            <button class="btn-launch" id="submit-btn" onclick="verifyAndLaunch()" style="margin-top: 15px; background: var(--success);">تأكيد الكود وإنشاء المتجر ✅</button>
        </div>
    </div>

    <div id="success-area" class="success-box">
        <div style="font-size: 4rem;">🎉</div>
        <h2>تم التحقق والتشغيل!</h2>
        <p id="store-id-display" style="font-weight:bold; color:var(--accent);"></p>
        <a href="admin.html" id="admin-link" style="display:block; margin-top:20px; background:var(--primary); color:white; padding:15px; border-radius:12px; text-decoration:none;">دخول لوحة التحكم</a>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    let generatedOTP = null;

    // 1. وظيفة إرسال الكود عبر التليجرام
    async function sendOTP() {
        const token = document.getElementById('bot-token').value.trim();
        const chatId = document.getElementById('chat-id').value.trim();
        const email = document.getElementById('owner-email').value.trim();

        if(!token || !chatId || !email) return alert("يرجى ملء الإيميل والتوكن والـ Chat ID أولاً!");

        // إنشاء كود عشوائي من 6 أرقام
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

        try {
            const msg = `👑 طلب تأسيس متجر جديد\n\nكود التحقق الخاص بك هو: ${generatedOTP}\n\nيرجى إدخاله في الصفحة لإتمام العملية.`;
            const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            const data = await res.json();

            if(data.ok) {
                alert("تم إرسال كود التحقق إلى حسابك في تليجرام بنجاح! ✅");
                document.getElementById('otp-area').style.display = 'block';
                document.getElementById('otp-btn').innerText = "إعادة إرسال الكود 🔄";
            } else {
                alert("فشل الإرسال: تأكد من صحة التوكن والـ Chat ID، وأنك قمت بمراسلة البوت أولاً.");
            }
        } catch (e) { alert("خطأ في الاتصال بتليجرام."); }
    }

    // 2. وظيفة التحقق النهائي والإنشاء
    async function verifyAndLaunch() {
        const userOTP = document.getElementById('user-otp').value.trim();
        const email = document.getElementById('owner-email').value.trim();
        const pass = document.getElementById('owner-pass').value.trim();
        const token = document.getElementById('bot-token').value.trim();

        if(userOTP !== generatedOTP) return alert("كود التحقق غير صحيح! ❌");

        // منع تكرار الإيميل
        const { data: exist } = await _supabase.from('stores').select('id').eq('owner_email', email).single();
        if(exist) return alert("هذا الإيميل مسجل مسبقاً.");

        // إنشاء المتجر
        const { data: store, error: sErr } = await _supabase.from('stores').insert([{ 
            owner_email: email, 
            store_name: "متجر جديد", 
            bot_token: token 
        }]).select().single();

        if(sErr) return alert("خطأ في الإنشاء: " + sErr.message);

        // إنشاء المدير
        await _supabase.from('staff').insert([{ 
            full_name: "مدير المتجر", 
            email: email, 
            password: pass, 
            role: 'owner', 
            store_id: store.id 
        }]);

        document.getElementById('setup-form').style.display = 'none';
        document.getElementById('success-area').style.display = 'block';
        document.getElementById('store-id-display').innerText = `ID المتجر: ${store.id}`;
        document.getElementById('admin-link').href = `admin.html?store_id=${store.id}`;
    }
</script>

</body>
</html>
