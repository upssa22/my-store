<script>
    // هذه الوظيفة الجديدة لجلب الرابط الحقيقي للملف من تليجرام
    async function viewMedia(fileId, type) {
        const BOT_TOKEN = CONFIG.TELEGRAM_TOKEN; // تأكد أن التوكن موجود في CONFIG
        
        try {
            // 1. نطلب من تليجرام مسار الملف
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
            const data = await res.json();
            
            if (data.ok) {
                const filePath = data.result.file_path;
                const fullUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${filePath}`;
                
                // 2. عرض الملف حسب نوعه
                if (type === 'photo') {
                    window.open(fullUrl, '_blank'); // يفتح الصورة في صفحة جديدة
                } else if (type === 'voice' || type === 'audio') {
                    const audio = new Audio(fullUrl);
                    audio.play();
                    alert("📢 جاري تشغيل البصمة الصوتية...");
                }
            } else {
                alert("❌ عذراً ملكي، تليجرام حذف الملف من سيرفراته (عادة بعد 24 ساعة).");
            }
        } catch (e) {
            alert("⚠️ خطأ في جلب الملف.");
        }
    }

    // تعديل سطر العرض في الكود السابق ليكون هكذا:
    // ${m.media_file_id ? `<button onclick="viewMedia('${m.media_file_id}', '${m.media_type}')" class="media-btn">👁️ عرض الوسائط</button>` : ''}
</script>
