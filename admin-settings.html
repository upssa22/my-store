<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات المظهر | ون بيس</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --dark: #2c3e50; --main: #3498db; --bg: #f4f7f6; }
        body { margin: 0; font-family: system-ui; background: var(--bg); direction: rtl; }
        .admin-header { background: var(--dark); color: white; padding: 25px 0; text-align: center; }
        .container { max-width: 700px; margin: 30px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .toggle-box { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn-save { background: #2ecc71; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        #preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>إعدادات واجهة البوت 🎨</h1>
    <div style="margin-top:10px;"><a href="admin.html" style="color:#bdc3c7; text-decoration:none;">الرئيسية</a> / <span>المظهر</span></div>
</div>

<div class="container">
    <div class="card">
        <div class="toggle-box">
            <span><b>وضع الصيانة (إغلاق المتجر):</b></span>
            <input type="checkbox" id="m-status" style="width: 30px; height: 30px; cursor: pointer;">
        </div>

        <h3>🖼️ صورة واجهة الانتظار</h3>
        <input type="text" id="m-img-url" placeholder="رابط صورة الواجهة (URL)" oninput="updatePreview()">
        <img id="preview-img" src="">

        <h3>📝 نص الرسالة للزبائن</h3>
        <textarea id="m-text" rows="3" placeholder="مثلاً: انتظرونا يوم الجمعة القادم..."></textarea>

        <button class="btn-save" onclick="saveSettings()">حفظ التغييرات ونشرها ✅</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    async function loadSettings() {
        const { data } = await _supabase.from('store_settings').select('*').eq('id', 1).single();
        if (data) {
            document.getElementById('m-status').checked = data.maintenance_mode;
            document.getElementById('m-img-url').value = data.maintenance_image;
            document.getElementById('m-text').value = data.maintenance_text;
            updatePreview();
        }
    }

    function updatePreview() {
        const url = document.getElementById('m-img-url').value;
        const img = document.getElementById('preview-img');
        if(url) { img.src = url; img.style.display = 'block'; }
    }

    async function saveSettings() {
        const { error } = await _supabase.from('store_settings').update({
            maintenance_mode: document.getElementById('m-status').checked,
            maintenance_image: document.getElementById('m-img-url').value,
            maintenance_text: document.getElementById('m-text').value
        }).eq('id', 1);

        if(!error) alert("تم تحديث الواجهة بنجاح!");
    }

    loadSettings();
</script>
</body>
</html>
