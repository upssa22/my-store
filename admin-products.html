<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>إدارة المنتجات 📦</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; direction: rtl; }
        .header { background: #1e293b; color: white; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 4px solid #c5a059; }
        .form { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        .btn-add { background: #c5a059; color: white; border: none; font-weight: bold; cursor: pointer; }
        .p-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .p-item { background: white; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="header"><h2>📦 إدارة ملصقات منوبولي</h2> <a href="admin.html" style="color:white; text-decoration:none;">🏠 العودة</a></div>
    <div class="form">
        <input type="text" id="n" placeholder="اسم الملصق">
        <input type="number" id="p" placeholder="السعر">
        <select id="c">
            <option value="⭐ 4 نجوم">⭐ 4 نجوم</option>
            <option value="⭐⭐ 5 نجوم">⭐⭐ 5 نجوم</option>
            <option value="🏆 ملصق ذهبي">🏆 ملصق ذهبي</option>
        </select>
        <input type="text" id="i" placeholder="رابط الصورة" style="grid-column: span 2;">
        <button class="btn-add" onclick="add()">نشر المنتج ✨</button>
    </div>
    <div id="list" class="p-list"></div>
    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        async function load() {
            const { data } = await _supabase.from('products').select('*').order('created_at', {ascending: false});
            document.getElementById('list').innerHTML = data.map(p => `
                <div class="p-item">
                    <img src="${p.image_url}" width="100">
                    <div>${p.name}</div>
                    <button onclick="del(${p.id})" style="color:red; border:none; background:none; cursor:pointer;">حذف 🗑️</button>
                </div>
            `).join('');
        }
        async function add() {
            await _supabase.from('products').insert([{ name: document.getElementById('n').value, price: document.getElementById('p').value, category: document.getElementById('c').value, image_url: document.getElementById('i').value }]);
            location.reload();
        }
        async function del(id) { if(confirm('حذف؟')) { await _supabase.from('products').delete().eq('id', id); load(); } }
        load();
    </script>
</body>
</html>
