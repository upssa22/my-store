<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإدارة العليا للمنصة | SaaS Dashboard 🌐</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --gold: #f59e0b; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: var(--primary); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--gold); }
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* كروت التقرير السريع */
        .report-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; padding: 30px; border-radius: 20px; position: relative; }
        
        /* الجدول المطور */
        .stores-card { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f1f5f9; padding: 15px; text-align: right; font-size: 0.85rem; color: #475569; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        
        /* الأزرار */
        .btn { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-link { background: #dbeafe; color: #1e40af; }
        .btn-report { background: #fef3c7; color: #92400e; margin: 0 5px; }
        .btn-del { background: #fee2e2; color: #b91c1c; }
        
        .sub-alert { font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; }
        .sub-valid { background: #dcfce7; color: #166534; }
        .sub-expired { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

<header class="header">
    <div>
        <h1 style="margin:0; font-size: 1.4rem;">🌐 نظام إدارة SaaS Users</h1>
        <small id="user-info">جاري التحقق من الصلاحيات...</small>
    </div>
    <button class="btn btn-del" onclick="logout()">تسجيل خروج</button>
</header>

<div class="main-container">
    <div class="stores-card">
        <table>
            <thead>
                <tr>
                    <th>المتجر والتاجر</th>
                    <th>الاشتراك</th>
                    <th>الرابط</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="stores-tbody"></tbody>
        </table>
    </div>
</div>

<div id="reportModal" class="report-modal">
    <div class="modal-content">
        <h2 id="rep-store-name">تقرير المتجر</h2>
        <hr>
        <div id="rep-details" style="line-height: 2;">
            </div>
        <button class="btn btn-del" onclick="closeModal()" style="width: 100%; margin-top: 20px;">إغلاق التقرير</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    // 1. نظام حماية SaaS Users
    async function checkSaaSAuth() {
        const saasUser = JSON.parse(sessionStorage.getItem('saasUser'));
        if (!saasUser) {
            window.location.href = 'admin.html'; // أو صفحة دخول مخصصة للـ SaaS
            return;
        }
        document.getElementById('user-info').innerText = `المسؤول: ${saasUser.full_name} (${saasUser.role})`;
        loadStores();
    }

    // 2. جلب المتاجر مع حسابات الاشتراكات
    async function loadStores() {
        const { data: stores, error } = await _supabase.from('stores').select('*').order('created_at', { ascending: false });
        const tbody = document.getElementById('stores-tbody');
        
        tbody.innerHTML = stores.map(store => {
            const today = new Date();
            const end = new Date(store.subscription_end);
            const diffDays = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
            const isExpired = diffDays < 0;

            return `
                <tr>
                    <td>
                        <strong>${store.store_name}</strong><br>
                        <small>${store.owner_email}</small>
                    </td>
                    <td>
                        <span class="sub-alert ${isExpired ? 'sub-expired' : 'sub-valid'}">
                            ${isExpired ? 'منتهي' : `باقي ${diffDays} يوم`}
                        </span>
                    </td>
                    <td>
                        <a href="index.html?id=${store.id}" target="_blank" class="btn btn-link">فتح المتجر 🔗</a>
                    </td>
                    <td>
                        <button class="btn btn-report" onclick="showReport('${store.id}')">تقرير كامل 📊</button>
                        <button class="btn btn-del" onclick="deleteStore('${store.id}')">حذف</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // 3. عرض تقرير المبيعات والمعلومات الشامل
    async function showReport(storeId) {
        const { data: store } = await _supabase.from('stores').select('*').eq('id', storeId).single();
        const { data: sales } = await _supabase.from('sales').select('price').eq('store_id', storeId);
        
        const totalSales = sales.reduce((sum, s) => sum + (s.price || 0), 0);
        const modal = document.getElementById('reportModal');
        const details = document.getElementById('rep-details');
        
        document.getElementById('rep-store-name').innerText = `تقرير: ${store.store_name}`;
        details.innerHTML = `
            <b>📧 الإيميل:</b> ${store.owner_email}<br>
            <b>📱 الجوال:</b> ${store.phone_number || 'غير مسجل'}<br>
            <b>📅 نهاية الاشتراك:</b> ${store.subscription_end}<br>
            <b>💰 إجمالي المبيعات:</b> ${totalSales.toFixed(2)} ر.س<br>
            <b>📦 عدد الطلبات:</b> ${sales.length}<br>
            <b>🤖 توكن البوت:</b> <small style="color:gray">${store.bot_token}</small>
        `;
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('reportModal').style.display = 'none'; }
    
    function logout() { sessionStorage.clear(); window.location.href = 'admin.html'; }

    checkSaaSAuth();
</script>
</body>
</html>
