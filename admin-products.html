<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المنتجات | ون بيس</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --dark: #2c3e50; --main: #3498db; --bg: #f4f7f6; --success: #2ecc71; --danger: #e74c3c; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); direction: rtl; }
        .admin-header { background: var(--dark); color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .breadcrumb { margin-top: 10px; font-size: 14px; color: #bdc3c7; }
        .breadcrumb a { color: var(--main); text-decoration: none; font-weight: bold; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-add { background: var(--main); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .prod-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; }
        .status { font-size: 11px; padding: 3px 8px; border-radius: 5px; color: white; }
        .status.active { background: var(--success); }
        .status.disabled { background: #95a5a6; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1 onclick="location.href='admin.html'" style="cursor:pointer; margin:0;">متجر ون بيس</h1>
    <div class="breadcrumb"><a href="admin.html">الرئيسية</a> / <span>إدارة المنتجات 📦</span></div>
</div>

<div class="container">
    <div class="card">
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="p-name" placeholder="اسم المنتج">
        <select id="p-cat"><option>ملصقات</option><option>شحن</option><option>حسابات</option></select>
        <input type="number" id="p-price" placeholder="السعر">
        <input type="text" id="p-img" placeholder="رابط الصورة">
        <input type="text" id="p-req" placeholder="الخانات المطلوبة (الاسم, الايدي)">
        <textarea id="p-desc" placeholder="وصف المنتج المساعد"></textarea>
        <button class="btn-add" onclick="save()">نشر المنتج ✅</button>
    </div>

    <div class="card">
        <h3>📦 قائمة المنتجات</h3>
        <div id="list">جاري التحميل...</div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    async function load() {
        const { data } = await _supabase.from('products').select('*').order('id', {ascending: false});
        document.getElementById('list').innerHTML = data.map(p => `
            <div class="prod-item">
                <div><b>${p.name}</b> <br><span class="status ${p.status}">${p.status}</span></div>
                <div>
                    <button onclick="toggle(${p.id}, '${p.status}')" style="background:#f39c12; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">${p.status==='active'?'تعطيل':'تفعيل'}</button>
                    <button onclick="del(${p.id})" style="background:var(--danger); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">حذف</button>
                </div>
            </div>`).join('');
    }
    async function save() {
        await _supabase.from('products').insert([{
            name: document.getElementById('p-name').value, category: document.getElementById('p-cat').value,
            price: parseFloat(document.getElementById('p-price').value), image_url: document.getElementById('p-img').value,
            required_fields: document.getElementById('p-req').value, description: document.getElementById('p-desc').value, status: 'active'
        }]);
        load();
    }
    async function toggle(id, cur) { await _supabase.from('products').update({status: cur==='active'?'disabled':'active'}).eq('id', id); load(); }
    async function del(id) { if(confirm("حذف؟")) { await _supabase.from('products').delete().eq('id', id); load(); } }
    load();
</script>
</body>
</html>
