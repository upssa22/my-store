<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إعدادات الواجهة الملكية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal: #1a237e; --gold: #c5a059; --bg: #f5f6fa; }
        body { font-family: system-ui; background: var(--bg); margin: 0; direction: rtl; }
        .admin-header { background: var(--royal); color: white; padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .back-btn { position: fixed; top: 15px; left: 15px; background: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 100; }
        
        .upload-zone { border: 3px dashed var(--gold); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; background: #fffcf5; margin: 20px 0; }
        #preview { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 1px solid #ddd; }
        
        .btn-save { background: var(--royal); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<button class="back-btn" onclick="location.href='admin.html'">⬅️ رجوع للوحة التحكم</button>

<div class="admin-header">
    <h1>🎨 مظهر المقر الملكي</h1>
</div>

<div class="container">
    <div class="card">
        <label style="display:flex; justify-content:space-between; align-items:center; cursor:pointer;">
            <b>🔒 وضع الانتظار (إغلاق المتجر):</b>
            <input type="checkbox" id="m-mode" style="width:25px; height:25px;">
        </label>

        <div class="upload-zone" onclick="document.getElementById('file-input').click()">
            <div id="u-text">🖼️ اضغط لرفع بانر "انتظرونا" المطور</div>
            <input type="file" id="file-input" hidden accept="image/*" onchange="uploadImage(this)">
        </div>

        <img id="preview" src="">
        <input type="hidden" id="img-url">

        <label>📝 نص الرسالة للجمهور:</label>
        <input type="text" id="m-text" placeholder="مثال: انتظرونا بحلة جديدة...">

        <button class="btn-save" onclick="save()">حفظ ونشر التعديلات ✅</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    async function load() {
        const { data } = await _supabase.from('store_settings').select('*').eq('id', 1).single();
        if(data) {
            document.getElementById('m-mode').checked = data.maintenance_mode;
            document.getElementById('m-text').value = data.maintenance_text;
            if(data.maintenance_image) {
                document.getElementById('preview').src = data.maintenance_image;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('img-url').value = data.maintenance_image;
            }
        }
    }

    async function uploadImage(input) {
        const file = input.files[0];
        if(!file) return;
        document.getElementById('u-text').innerText = "جاري الرفع... ⏳";
        
        const fileName = `banner_${Date.now()}.png`;
        const { data, error } = await _supabase.storage.from('store-assets').upload(fileName, file);

        if(!error) {
            const { data: { publicUrl } } = _supabase.storage.from('store-assets').getPublicUrl(fileName);
            document.getElementById('img-url').value = publicUrl;
            document.getElementById('preview').src = publicUrl;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('u-text').innerText = "تم الرفع بنجاح ✅";
        }
    }

    async function save() {
        await _supabase.from('store_settings').update({
            maintenance_mode: document.getElementById('m-mode').checked,
            maintenance_text: document.getElementById('m-text').value,
            maintenance_image: document.getElementById('img-url').value
        }).eq('id', 1);
        alert("تم تحديث الواجهة بنجاح!");
    }
    load();
</script>
</body>
</html>
