<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة المنتجات | رفع احترافي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --main: #3b82f6; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: system-ui; background: var(--bg); margin: 0; direction: rtl; }
        .admin-header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .upload-btn { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; text-align: center; cursor: pointer; border-radius: 10px; }
        .btn-save { background: var(--main); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #img-preview { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>📦 إضافة منتجات بالصور</h1>
    <a href="admin.html" style="color: #94a3b8; text-decoration: none;">العودة للرئيسية</a>
</div>

<div class="container">
    <div class="card">
        <h3>➕ إضافة منتج</h3>
        <input type="text" id="p-name" placeholder="اسم المنتج">
        <input type="number" id="p-price" placeholder="السعر">
        
        <div class="upload-btn" onclick="document.getElementById('file-input').click()">
            <span id="status-text">🖼️ اضغط لرفع صورة المنتج</span>
            <input type="file" id="file-input" hidden accept="image/*" onchange="uploadImage(this)">
        </div>
        <img id="img-preview">
        <input type="hidden" id="p-img-url">

        <textarea id="p-desc" placeholder="وصف قصير"></textarea>
        <button class="btn-save" onclick="saveProduct()">إضافة المنتج للمتجر ✅</button>
    </div>

    <div class="card">
        <h3>📦 المنتجات الحالية</h3>
        <div id="products-list"></div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    async function uploadImage(input) {
        const file = input.files[0];
        if(!file) return;

        document.getElementById('status-text').innerText = "جاري الرفع... ⏳";
        const fileName = `prod_${Date.now()}.${file.name.split('.').pop()}`;

        // الرفع لـ Supabase Storage
        const { data, error } = await _supabase.storage.from('store-assets').upload(fileName, file);

        if(error) {
            alert("خطأ في الرفع: " + error.message);
        } else {
            const { data: { publicUrl } } = _supabase.storage.from('store-assets').getPublicUrl(fileName);
            document.getElementById('p-img-url').value = publicUrl;
            document.getElementById('img-preview').src = publicUrl;
            document.getElementById('img-preview').style.display = 'block';
            document.getElementById('status-text').innerText = "تم الرفع ✅";
        }
    }

    async function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img-url').value;

        if(!name || !price || !img) return alert("أكمل البيانات والصورة!");

        await _supabase.from('products').insert([{
            name, price: parseFloat(price), image_url: img, status: 'active', description: document.getElementById('p-desc').value
        }]);
        
        location.reload(); // تحديث القائمة
    }

    // وظيفة لعرض المنتجات (اختصارا)
    async function load() {
        const { data } = await _supabase.from('products').select('*').order('id', {ascending:false});
        document.getElementById('products-list').innerHTML = data.map(p => `
            <div style="display:flex; gap:10px; border-bottom:1px solid #eee; padding:10px 0;">
                <img src="${p.image_url}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;">
                <div><b>${p.name}</b><br><small>${p.price}${CONFIG.CURRENCY}</small></div>
            </div>`).join('');
    }
    load();
</script>
</body>
</html>
