<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقر الملكي | تحت الصيانة ✨</title>
    <style>
        body { margin: 0; padding: 0; background: #1e293b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .box { padding: 40px; border: 2px solid #c5a059; border-radius: 30px; background: rgba(255,255,255,0.03); max-width: 500px; }
        .gold { color: #c5a059; font-size: 4rem; margin-bottom: 20px; }
        h1 { margin: 10px 0; font-size: 2rem; }
        p { color: #94a3b8; line-height: 1.6; }
        .loader { width: 50px; height: 50px; border: 5px solid #94a3b8; border-top: 5px solid #c5a059; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="gold">🏰</div>
        <h1>المقر الملكي في صيانة</h1>
        <p>يا زائرنا الكريم، نحن نقوم الآن بتجهيز أحدث ملصقات منوبولي وتطوير المتجر لخدمتكم بشكل أفضل. سنعود قريباً جداً!</p>
        <div class="loader"></div>
        <p style="font-size: 0.8rem;">ترقبوا الافتتاح الكبير ✨</p>
    </div>
</body>
</html>
