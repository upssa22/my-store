<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المراقبة الملكية 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { --royal-blue: #1e293b; --royal-gold: #c5a059; --bg-gray: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gray); margin: 0; padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: auto; }
        .header { background: var(--royal-blue); color: white; padding: 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 4px solid var(--royal-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-refresh { background: var(--royal-gold); border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn-refresh:hover { background: #b08d4a; transform: scale(1.05); }
        .msg-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-right: 6px solid var(--royal-gold); box-shadow: 0 4px 6px rgba(0,0,0,0.05); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-info { display: flex; justify-content: space-between; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; }
        .user-name { font-weight: 800; color: var(--royal-blue); }
        .time { font-size: 0.85rem; color: #94a3b8; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; background: #f1f5f9; color: #64748b; font-weight: bold; margin-left: 10px; border: 1px solid #e2e8f0; }
        .media-btn { margin-top: 15px; padding: 10px 20px; background: #fffbeb; border: 1px solid var(--royal-gold); border-radius: 10px; color: #b45309; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .media-btn:hover { background: var(--royal-gold); color: white; }
        .empty-state { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📬 سجل زوار المقر الملكي</h2>
            <button class="btn-refresh" onclick="fetchMessages()">تحديث السجل 🔄</button>
        </div>
        <div id="messages-list"><div class="empty-state">جاري استدعاء البيانات من السيرفر...</div></div>
    </div>

    <script>
        const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        async function fetchMessages() {
            const { data, error } = await _supabase.from('incoming_messages').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('messages-list');
            
            if (error) { list.innerHTML = `<div class="empty-state">❌ خطأ: ${error.message}</div>`; return; }
            if (!data || data.length === 0) { list.innerHTML = `<div class="empty-state">📭 لا توجد رسائل حالياً.</div>`; return; }

            list.innerHTML = data.map(m => `
                <div class="msg-card">
                    <div class="user-info">
                        <div><span class="user-name">👤 ${m.full_name}</span> <span style="color:var(--royal-gold)">@${m.username || 'n/a'}</span></div>
                        <span class="time">${new Date(m.created_at).toLocaleString('ar-EG')}</span>
                    </div>
                    <div class="content">
                        <span class="badge">النوع: ${getArabicType(m.media_type)}</span> 
                        <div style="margin-top:8px">${m.message_text || '<span style="color:#94a3b8">رسالة فارغة</span>'}</div>
                        ${m.media_file_id ? `<button class="media-btn" onclick="openMedia('${m.media_file_id}', '${m.media_type}')">👁️ عرض / سماع الوسائط</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function openMedia(fileId, type) {
            // نستخدم السيرفر الوسيط لضمان الأمان وعدم كشف التوكن
            const secureUrl = `/api/get-media?fileId=${fileId}`;
            
            if (type === 'photo') {
                window.open(secureUrl, '_blank');
            } else {
                const audio = new Audio(secureUrl);
                audio.play();
                alert("🎙️ جاري تشغيل البصمة الصوتية عبر الممر الآمن...");
            }
        }

        function getArabicType(t) {
            const types = { 'text': 'نص 📝', 'photo': 'صورة 🖼️', 'voice': 'بصمة صوتية 🎙️' };
            return types[t] || t;
        }

        fetchMessages();
        setInterval(fetchMessages, 60000); // تحديث كل دقيقة تلقائياً
    </script>
</body>
</html>
