<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المراقبة الملكية 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app-config.js"></script>
    <style>
        :root { 
            --royal-blue: #1e293b; 
            --royal-gold: #c5a059; 
            --bg-gray: #f8fafc; 
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-gray); 
            margin: 0; 
            padding: 20px; 
            direction: rtl; 
            color: #334155;
        }

        .container { max-width: 900px; margin: auto; }

        /* الهيدر الملكي */
        .header { 
            background: var(--royal-blue); 
            color: white; 
            padding: 25px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 4px solid var(--royal-gold); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .header h2 { margin: 0; font-size: 1.4rem; }

        .btn-refresh { 
            background: var(--royal-gold); 
            border: none; 
            padding: 12px 25px; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-refresh:hover { background: #b08d4a; transform: translateY(-2px); }

        /* بطاقة الرسالة */
        .msg-card { 
            background: white; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 15px; 
            border-right: 6px solid var(--royal-gold); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-info { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px dashed #e2e8f0; 
            padding-bottom: 12px; 
            margin-bottom: 15px; 
        }

        .user-name { font-weight: 800; color: var(--royal-blue); font-size: 1.1rem; }
        .time { font-size: 0.85rem; color: #94a3b8; font-weight: 600; }

        .badge { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            background: #f1f5f9; 
            color: #64748b; 
            font-weight: bold; 
            margin-left: 10px; 
            border: 1px solid #e2e8f0; 
        }

        /* زر فتح الوسائط */
        .media-btn { 
            margin-top: 15px; 
            padding: 12px 22px; 
            background: #fffbeb; 
            border: 1px solid var(--royal-gold); 
            border-radius: 12px; 
            color: #b45309; 
            cursor: pointer; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.2s;
        }

        .media-btn:hover { background: var(--royal-gold); color: white; }
