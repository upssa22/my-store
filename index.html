<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر مونوپولي المطور</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #0088cc; --sub: #31b545; --bg: #efeff4; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .page { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: white; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; overflow: hidden; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .box { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .qty-btn { background: var(--main); color: white; border: none; width: 45px; height: 45px; border-radius: 12px; font-size: 20px; cursor: pointer; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-confirm { background: var(--sub); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h2 style="text-align: center;">🛍️ متجر مونوپولي الآمن</h2>
        <div id="product-list">
            <div class="card" onclick="openP('🃏 ملصقات نادرة', 'احصل على الملصقات المفقودة لإنهاء الألبوم فوراً.', 5, 'https://images.unsplash.com/photo-1614680376593-902f74cf0d41?w=500')">
                <img src="https://images.unsplash.com/photo-1614680376593-902f74cf0d41?w=500" alt="">
                <div class="card-info"><h3>🃏 ملصقات نادرة</h3> <b>5$</b></div>
            </div>
            <div class="card" onclick="openP('⭐ شحن نجوم', 'شحن نجوم تلجرام رسمي وآمن 100%.', 10, 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=500')">
                <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=500" alt="">
                <div class="card-info"><h3>⭐ شحن نجوم</h3> <b>10$</b></div>
            </div>
        </div>
    </div>

    <div id="details" class="page">
        <div class="box">
            <img id="p-img" style="width: 100%; border-radius: 15px; height: 200px; object-fit: cover;" src="" alt="">
            <h2 id="p-title"></h2>
            <p id="p-desc" style="color: #666;"></p>
            <div class="qty-box">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <b id="qty-val" style="font-size: 24px;">1</b>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <input type="text" id="user-id" placeholder="رابط حسابك أو اسمك في اللعبة">
            <button class="btn-confirm" onclick="addToCart()">🛒 إضافة للسلة</button>
            <button onclick="showPage('home')" style="background: none; border: none; color: #888; margin-top: 15px; cursor: pointer;">عودة</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [], currentP = {}, qty = 1;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'home' && cart.length > 0) {
                tg.MainButton.setText(`إرسال الطلب (${cart.length}) 🚀`);
                tg.MainButton.show();
            }
        }

        function openP(name, desc, price, img) {
            currentP = {name, price};
            qty = 1;
            document.getElementById('p-title').innerText = name;
            document.getElementById('p-desc').innerText = desc;
            document.getElementById('p-img').src = img;
            document.getElementById('qty-val').innerText = qty;
            showPage('details');
        }

        function changeQty(v) {
            qty = Math.max(1, qty + v);
            document.getElementById('qty-val').innerText = qty;
        }

        function addToCart() {
            let user = document.getElementById('user-id').value;
            if(!user) return tg.showAlert("يرجى إدخال معلومات حسابك");
            cart.push({...currentP, qty, user});
            showPage('home');
        }

        tg.MainButton.onClick(async () => {
            tg.MainButton.showProgress();
            
            let summary = `<b>📦 طلب جديد من: ${tg.initDataUnsafe.user.first_name}</b>\n\n`;
            cart.forEach((i, n) => {
                summary += `${n+1}- ${i.name} (الكمية: ${i.qty})\n👤 الحساب: ${i.user}\n\n`;
            });

            // إرسال الطلب للـ API المخفي
            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: summary })
                });
                if(res.ok) {
                    tg.showAlert("✅ تم إرسال طلبك بنجاح!");
                    tg.close();
                }
            } catch(e) {
                tg.showAlert("❌ فشل الإرسال، حاول لاحقاً.");
            }
            tg.MainButton.hideProgress();
        });
    </script>
</body>
</html>
